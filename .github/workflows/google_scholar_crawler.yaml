name: Update Google Scholar Stats

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  update-scholar-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run script to update Scholar stats
        run: python scripts/main.py --stats-output /tmp/gs_data.json

      - name: Commit and push badge if there are changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add images/scholar_badge.svg
          git diff --staged --quiet || (git commit -m 'Update Google Scholar badge' && git push)

      - name: Publish Scholar stats JSON
        run: |
          git fetch origin google-scholar-stats || true
          if git show-ref --verify --quiet refs/remotes/origin/google-scholar-stats; then
            git switch --track origin/google-scholar-stats
          else
            git switch --orphan google-scholar-stats
            git rm -rf .
          fi
          cp /tmp/gs_data.json gs_data.json
          git add gs_data.json
          git diff --staged --quiet || (git commit -m 'Update Google Scholar stats' && git push origin google-scholar-stats)
